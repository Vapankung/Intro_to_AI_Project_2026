<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YOLO Waste Sorter Prototype</title>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #222;
        }

        h1 {
            margin: 8px 0 12px;
            text-align: center;
        }

        #simulation-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 90%;
            max-width: 1100px;
            padding: 20px;
            background: #fff;
            border: 2px solid #333;
            position: relative;
            margin-top: 180px; /* Increased to fit new UI elements */
            min-height: 160px;
            gap: 12px;
        }

        #stations-wrapper {
            position: absolute;
            top: -160px; /* Increased height to fit reset buttons */
            left: 220px;
            right: 180px;
            height: 150px;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            pointer-events: none;
        }

        .station {
            width: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            pointer-events: auto; /* Re-enable clicks inside the wrapper */
            cursor: pointer;
        }
        
        .station-mid {
            display: flex;
            align-items: flex-end;
            gap: 10px;
        }

        .station:hover .bin { background-color: #eef; }

        .station-title {
            font-weight: bold;
            font-size: 14px;
            text-align: center;
        }

        .bin-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .bin {
            width: 88px;
            height: 62px;
            border: 3px solid #333;
            border-bottom: none;
            border-radius: 6px 6px 0 0;
            background: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 1.15;
            padding: 4px;
            font-size: 13px;
            transition: background-color 0.2s;
        }

        /* --- New Custom CSS for Buzzers and Reset --- */
        .buzzer-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            margin-bottom: 5px;
        }

        .buzzer-label {
            color: #d32f2f;
            font-weight: bold;
            font-size: 13px;
            font-family: 'Comic Sans MS', cursive, sans-serif; 
        }

        .buzzer {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid #333;
            background-color: #4CAF50; /* Defaults to Green */
            transition: background-color 0.3s;
        }

        .reset-bin-btn {
            background: #fff;
            border: 2px solid #FFC107;
            color: #F57F17;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            text-transform: uppercase;
        }

        .reset-bin-btn:hover {
            background: #FFF8E1;
        }

        .box {
            border: 3px solid #333;
            background: #fff;
            padding: 10px;
            min-width: 180px;
            text-align: center;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .box:hover { background-color: #eef; }

        #camera-box:hover { background-color: #fff; cursor: default; }

        .sub {
            font-size: 12px;
            color: #666;
        }

        #camera-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 190px;
        }

        #camera-preview {
            width: 160px;
            height: 120px;
            object-fit: cover;
            border: 2px solid #333;
            border-radius: 8px;
            background: #000;
            cursor: pointer;
            transition: transform 0.2s;
        }
        #camera-preview:hover { transform: scale(1.05); }

        #conveyor-container {
            flex: 1;
            height: 60px;
            margin: 0 12px;
            position: relative;
            overflow: hidden;
            border-top: 3px solid #333;
            border-bottom: 3px solid #333;
            background: repeating-linear-gradient(
                90deg,
                #ddd,
                #ddd 10px,
                #bbb 10px,
                #bbb 20px
            );
            animation: move-belt 0.9s linear infinite;
        }

        @keyframes move-belt {
            from { background-position: 0 0; }
            to   { background-position: 20px 0; }
        }

        .waste-item {
            width: 40px;
            height: 40px;
            position: absolute;
            left: 0;
            top: 10px;
            border-radius: 8px;
            border: 3px solid rgba(0, 0, 0, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
            font-size: 12px;
            transition: top 0.25s ease, opacity 0.25s ease;
            user-select: none;
        }

        .type-recycle   { background: #2196F3; }
        .type-wet       { background: #4CAF50; }
        .type-hazardous { background: #F44336; }
        .type-general   { background: #9E9E9E; }

        #status-panel {
            width: 90%;
            max-width: 1100px;
            margin-top: 14px;
            display: grid;
            gap: 8px;
        }

        .status-box {
            background: #fff;
            border: 1px solid #ccc;
            padding: 8px 10px;
            font-family: Consolas, monospace;
            font-size: 13px;
            word-break: break-word;
        }

        .controls {
            width: 90%;
            max-width: 1100px;
            margin-top: 10px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button.global-btn {
            border: 1px solid #777;
            background: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        button.global-btn:hover { background: #f0f0f0; }

        .note {
            margin-top: 8px;
            color: #666;
            font-size: 12px;
            text-align: center;
        }

        /* --- Modal CSS --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .modal-content-img {
            max-width: 90%;
            max-height: 80%;
            border: 4px solid #fff;
            border-radius: 8px;
        }
        .modal-content-text {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            min-width: 300px;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            font-size: 16px;
        }
        .close-btn {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        ul.history-list {
            text-align: left;
            padding-left: 20px;
        }
    </style>
</head>
<body>

    <h1>YOLO Waste Sorter Prototype</h1>

    <div id="cam-modal" class="modal" onclick="closeModals()">
        <span class="close-btn">&times;</span>
        <img class="modal-content-img" id="modal-img-src" src="">
    </div>

    <div id="history-modal" class="modal" onclick="if(event.target === this) closeModals()">
        <span class="close-btn" onclick="closeModals()">&times;</span>
        <div class="modal-content-text" id="history-content"></div>
    </div>

    <div id="simulation-container">
        <div id="stations-wrapper">
            
            <div class="station" id="station-recycle">
                <button class="reset-bin-btn" onclick="resetBin(event, 'recycle')">RESET</button>
                <div class="station-mid">
                    <div class="buzzer-wrapper">
                        <span class="buzzer-label">Buzzer</span>
                        <div class="buzzer" id="buzzer-recycle"></div>
                    </div>
                    <div class="bin-wrapper">
                        <div class="station-title">Recycle</div>
                        <div class="bin">Count: <span id="count-recycle">0</span></div>
                    </div>
                </div>
            </div>

            <div class="station" id="station-wet">
                <button class="reset-bin-btn" onclick="resetBin(event, 'wet')">RESET</button>
                <div class="station-mid">
                    <div class="buzzer-wrapper">
                        <span class="buzzer-label">Buzzer</span>
                        <div class="buzzer" id="buzzer-wet"></div>
                    </div>
                    <div class="bin-wrapper">
                        <div class="station-title">Wet</div>
                        <div class="bin">Count: <span id="count-wet">0</span></div>
                    </div>
                </div>
            </div>

            <div class="station" id="station-hazardous">
                <button class="reset-bin-btn" onclick="resetBin(event, 'hazardous')">RESET</button>
                <div class="station-mid">
                    <div class="buzzer-wrapper">
                        <span class="buzzer-label">Buzzer</span>
                        <div class="buzzer" id="buzzer-hazardous"></div>
                    </div>
                    <div class="bin-wrapper">
                        <div class="station-title">Hazardous</div>
                        <div class="bin">Count: <span id="count-hazardous">0</span></div>
                    </div>
                </div>
            </div>

        </div>

        <div class="box" id="camera-box">
            <div><b>Input Cam</b></div>
            <img id="camera-preview" src="/video_feed" alt="Camera preview" title="Click to enlarge">
            <div id="cam-status" class="sub" style="color: green;">● Connecting...</div>
        </div>

        <div id="conveyor-container"></div>

        <div class="box" id="station-general">
            <div><b>General</b></div>
            <div>Count: <span id="count-general">0</span></div>
        </div>
    </div>

    <div id="status-panel">
        <div id="connection-status" class="status-box">Socket: Connecting...</div>
        <div id="log" class="status-box">Waiting for detection...</div>
        <div id="zone-debug" class="status-box">Zones: calculating...</div>
    </div>

    <div class="controls">
        <button class="global-btn" onclick="generateWaste('recycle', 'manual_bottle')">Test Recycle</button>
        <button class="global-btn" onclick="generateWaste('wet', 'manual_banana')">Test Wet</button>
        <button class="global-btn" onclick="generateWaste('hazardous', 'manual_phone')">Test Hazardous</button>
        <button class="global-btn" onclick="generateWaste('general', 'manual_cup')">Test General</button>
        <button class="global-btn" onclick="resetCounters()">Reset Counters (All)</button>
    </div>

    <div class="note">
        Webcam → YOLO Tracker → mapped into recycle / wet / hazardous / general
    </div>

    <script>
        const connectionStatusEl = document.getElementById("connection-status");
        const logEl = document.getElementById("log");
        const zoneDebugEl = document.getElementById("zone-debug");
        const camStatusEl = document.getElementById("cam-status");

        const socket = io({
            transports: ["websocket", "polling"]
        });

        const binHistory = { recycle: [], wet: [], hazardous: [], general: [] };

        socket.on("connect", () => {
            connectionStatusEl.textContent = `Socket: Connected (id=${socket.id})`;
        });

        socket.on("disconnect", () => {
            connectionStatusEl.textContent = "Socket: Disconnected";
        });

        socket.on("connect_error", (err) => {
            connectionStatusEl.textContent = "Socket Error: " + err.message;
        });

        socket.on("system_status", (data) => {
            camStatusEl.textContent = `● ${data.message}`;
            camStatusEl.style.color = data.ok ? "green" : "red";
        });

        socket.on("trash_detected", (data) => {
            const conf = (typeof data.confidence === "number")
                ? ` (${Math.round(data.confidence * 100)}%)`
                : "";
            logEl.textContent = `Last Detection: ${data.object_name}${conf} -> ${data.bin_type}`;
            generateWaste(data.bin_type, data.object_name);
        });

        const conveyorContainer = document.getElementById("conveyor-container");
        const conveyorSpeed = 2.0;
        const itemWidth = 40;

        // --- NEW VARIABLES FOR LOGIC ---
        let isConveyorRunning = true;
        const MAX_CAPACITY = 20;
        const YELLOW_CAPACITY = 16; 

        let wasteItems = [];
        let nextId = 1;

        const counters = {
            recycle: 0,
            wet: 0,
            hazardous: 0,
            general: 0
        };

        const zones = {
            recycle: { start: 50, end: 120 },
            wet: { start: 200, end: 270 },
            hazardous: { start: 350, end: 420 }
        };

        function updateCounterDisplay(binType) {
            document.getElementById(`count-${binType}`).textContent = counters[binType];
        }

        // --- NEW BUZZER AND CONVEYOR LOGIC ---
        function updateBuzzer(binType) {
            if(binType === "general") return; 

            const buzzerElt = document.getElementById(`buzzer-${binType}`);
            if(!buzzerElt) return;

            const count = counters[binType];
            if (count >= MAX_CAPACITY) {
                buzzerElt.style.backgroundColor = "#F44336"; // Red (100%)
            } else if (count >= YELLOW_CAPACITY) {
                buzzerElt.style.backgroundColor = "#FFEB3B"; // Yellow (80%)
            } else {
                buzzerElt.style.backgroundColor = "#4CAF50"; // Green (0-79%)
            }
        }

        function checkConveyorStatus() {
            // Stop logic if any sorted bin is full
            const isFull = counters.recycle >= MAX_CAPACITY || 
                           counters.wet >= MAX_CAPACITY || 
                           counters.hazardous >= MAX_CAPACITY;
                           
            isConveyorRunning = !isFull;

            // Pause or play CSS animation for Conveyor background
            if(isConveyorRunning) {
                conveyorContainer.style.animationPlayState = "running";
            } else {
                conveyorContainer.style.animationPlayState = "paused";
            }
        }

        function resetBin(e, binType) {
            e.stopPropagation(); // prevent triggering the History Modal

            counters[binType] = 0;
            binHistory[binType] = [];
            
            updateCounterDisplay(binType);
            updateBuzzer(binType);
            checkConveyorStatus();
        }

        function resetCounters() {
            counters.recycle = 0;
            counters.wet = 0;
            counters.hazardous = 0;
            counters.general = 0;

            updateCounterDisplay("recycle");
            updateCounterDisplay("wet");
            updateCounterDisplay("hazardous");
            updateCounterDisplay("general");
            
            binHistory.recycle = [];
            binHistory.wet = [];
            binHistory.hazardous = [];
            binHistory.general = [];

            updateBuzzer("recycle");
            updateBuzzer("wet");
            updateBuzzer("hazardous");
            checkConveyorStatus();
        }

        function normalizeBinType(type) {
            if (["recycle", "wet", "hazardous", "general"].includes(type)) return type;
            return "general";
        }

        function shortLabel(name) {
            const clean = String(name || "item").replace(/[^a-zA-Z0-9]/g, "");
            return clean.substring(0, 3).toUpperCase() || "ITM";
        }

        function generateWaste(type, label) {
            // Prevent new physical items on the belt if stopped
            if(!isConveyorRunning) return; 

            type = normalizeBinType(type);

            const el = document.createElement("div");
            el.className = `waste-item type-${type}`;
            el.textContent = shortLabel(label);

            conveyorContainer.appendChild(el);

            wasteItems.push({
                id: nextId++,
                element: el,
                position: 0,
                type: type,
                active: true,
                collected: false,
                originalLabel: label 
            });
        }

        function stationCenterXRelativeToConveyor(stationId) {
            const stationEl = document.getElementById(stationId);
            const stationRect = stationEl.getBoundingClientRect();
            const conveyorRect = conveyorContainer.getBoundingClientRect();
            return (stationRect.left + stationRect.width / 2) - conveyorRect.left;
        }

        function recalculateZones() {
            const conveyorWidth = conveyorContainer.offsetWidth;
            if (!conveyorWidth) return;

            const halfWidth = 35;

            const recycleCenter = stationCenterXRelativeToConveyor("station-recycle");
            const wetCenter = stationCenterXRelativeToConveyor("station-wet");
            const hazardousCenter = stationCenterXRelativeToConveyor("station-hazardous");

            zones.recycle = {
                start: Math.max(0, recycleCenter - halfWidth),
                end: Math.min(conveyorWidth, recycleCenter + halfWidth),
            };
            zones.wet = {
                start: Math.max(0, wetCenter - halfWidth),
                end: Math.min(conveyorWidth, wetCenter + halfWidth),
            };
            zones.hazardous = {
                start: Math.max(0, hazardousCenter - halfWidth),
                end: Math.min(conveyorWidth, hazardousCenter + halfWidth),
            };

            zoneDebugEl.textContent =
                `Zones | recycle: ${Math.round(zones.recycle.start)}-${Math.round(zones.recycle.end)} | ` +
                `wet: ${Math.round(zones.wet.start)}-${Math.round(zones.wet.end)} | ` +
                `hazardous: ${Math.round(zones.hazardous.start)}-${Math.round(zones.hazardous.end)}`;
        }

        function collectItem(item, binType) {
            if (!item || !item.active || item.collected) return;

            item.collected = true;
            item.active = false;

            if (binType !== "general") {
                item.element.style.top = "-50px";
                item.element.style.opacity = "0";
            } else {
                item.element.style.opacity = "0";
            }

            binHistory[binType].push({
                label: item.originalLabel,
                time: new Date().toLocaleTimeString()
            });

            counters[binType] += 1;
            updateCounterDisplay(binType);
            
            // --- UPDATE BUZZER AND BELT STATUS ---
            updateBuzzer(binType);
            checkConveyorStatus();

            setTimeout(() => {
                if (item.element && item.element.parentNode) {
                    item.element.remove();
                }
                wasteItems = wasteItems.filter(w => w.id !== item.id);
            }, 250);
        }

        function gameLoop() {
            const conveyorWidth = conveyorContainer.offsetWidth;

            // Only move objects forward if the conveyor isn't halted
            if(isConveyorRunning) {
                for (let i = wasteItems.length - 1; i >= 0; i--) {
                    const item = wasteItems[i];
                    if (!item.active) continue;

                    item.position += conveyorSpeed;
                    item.element.style.left = item.position + "px";

                    if (zones[item.type]) {
                        const z = zones[item.type];
                        if (item.position > z.start && item.position < z.end) {
                            collectItem(item, item.type);
                            continue;
                        }
                    }

                    if (item.position > (conveyorWidth - itemWidth)) {
                        collectItem(item, "general");
                    }
                }
            }

            requestAnimationFrame(gameLoop);
        }

        // --- Modal Event Listeners ---
        function closeModals() {
            document.getElementById("cam-modal").style.display = "none";
            document.getElementById("history-modal").style.display = "none";
        }

        function showHistoryModal(binType) {
            const hist = binHistory[binType];
            const content = document.getElementById("history-content");
            
            let html = `<h2 style="margin-top:0; text-transform:capitalize;">${binType} Bin History</h2>`;
            if (hist.length === 0) {
                html += `<p>No items detected yet.</p>`;
            } else {
                html += `<ul class="history-list">`;
                [...hist].reverse().forEach(h => {
                    html += `<li><strong>${h.time}</strong> - ${h.label}</li>`;
                });
                html += `</ul>`;
            }
            
            content.innerHTML = html;
            document.getElementById("history-modal").style.display = "flex";
        }

        document.getElementById("camera-preview").addEventListener("click", function() {
            const modal = document.getElementById("cam-modal");
            const modalImg = document.getElementById("modal-img-src");
            modalImg.src = this.src; 
            modal.style.display = "flex";
        });

        document.getElementById("station-recycle").addEventListener("click", () => showHistoryModal("recycle"));
        document.getElementById("station-wet").addEventListener("click", () => showHistoryModal("wet"));
        document.getElementById("station-hazardous").addEventListener("click", () => showHistoryModal("hazardous"));
        document.getElementById("station-general").addEventListener("click", () => showHistoryModal("general"));

        window.addEventListener("load", () => {
            recalculateZones();
            // Initialize Default States
            updateBuzzer("recycle");
            updateBuzzer("wet");
            updateBuzzer("hazardous");
            requestAnimationFrame(gameLoop);
        });

        window.addEventListener("resize", recalculateZones);
    </script>
</body>
</html>
