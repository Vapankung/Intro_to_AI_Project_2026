<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COCO Waste Demo</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #222;
        }
        .page {
            max-width: 1200px;
            margin: 30px auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 25px;
        }
        .dashboard {
            display: flex;
            gap: 24px;
            align-items: flex-start;
        }
        .video-panel {
            flex: 2;
            background: white;
            padding: 16px;
            border-radius: 16px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }
        .video-panel img {
            width: 100%;
            border-radius: 12px;
            display: block;
        }
        .info-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .card {
            background: white;
            padding: 18px;
            border-radius: 16px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }
        .waste-box {
            font-size: 28px;
            font-weight: bold;
            margin-top: 10px;
        }
        ul {
            padding-left: 20px;
        }
    </style>
</head>
<body>
    <div class="page">
        <h1>Smart Waste Demo with COCO YOLO</h1>

        <div class="dashboard">
            <div class="video-panel">
                <img src="/video_feed" alt="Live stream">
            </div>

            <div class="info-panel">
                <div class="card">
                    <h2>Current Detection</h2>
                    <p><strong>Detected object:</strong> <span id="top-label">None</span></p>
                    <p><strong>Confidence:</strong> <span id="top-conf">0</span></p>
                    <p><strong>Object count:</strong> <span id="object-count">0</span></p>
                    <p><strong>FPS:</strong> <span id="fps">0</span></p>
                    <div class="waste-box">
                        Bin Type: <span id="waste-type">Unknown</span>
                    </div>
                </div>

                <div class="card">
                    <h2>Detected Objects</h2>
                    <ul id="object-list">
                        <li>No objects detected</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function updateDetections() {
            try {
                const response = await fetch("/detections");
                const data = await response.json();

                document.getElementById("top-label").textContent = data.top_label;
                document.getElementById("top-conf").textContent = data.top_conf;
                document.getElementById("object-count").textContent = data.object_count;
                document.getElementById("fps").textContent = data.fps;
                document.getElementById("waste-type").textContent = data.waste_type;

                const objectList = document.getElementById("object-list");
                objectList.innerHTML = "";

                if (data.objects.length === 0) {
                    const li = document.createElement("li");
                    li.textContent = "No objects detected";
                    objectList.appendChild(li);
                } else {
                    data.objects.forEach(obj => {
                        const li = document.createElement("li");
                        li.textContent = `${obj.label} → ${obj.waste_type} (${obj.confidence})`;
                        objectList.appendChild(li);
                    });
                }
            } catch (err) {
                console.error(err);
            }
        }

        setInterval(updateDetections, 500);
        updateDetections();
    </script>
</body>
</html>
